<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700<style>family=Bricolage+Grotesque:opsz,wght@12..96,800<style>family=Nunito:wght@400;600;700;800<style>display=swap" rel="stylesheet">
<style>:root{--canvas:#FFF9F8;--canvas-soft:#FFF2EE;--ink:#4A3A3E;--body:#6B5A5E;--body-mid:#9A8A8E;--mute:#E8D5D0;--primary:#FF9CB5;--primary-dark:#E87A95;--on-primary:#FFFEFB;--radius-sm:10px;--radius-md:18px;--radius-pill:9999px;--font:"Quicksand","Nunito",sans-serif;--font-heading:"Bricolage Grotesque","Nunito",sans-serif;--shadow:0 4px 16px rgba(255,156,181,.15)}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#FFF5F2}body{font-family:var(--font);font-size:16px;line-height:1.5;color:var(--body);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow:hidden}.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--canvas);position:relative;overflow:hidden}.app-blob{position:absolute;border-radius:9999px;pointer-events:none;z-index:0}.app-blob.b1{width:280px;height:280px;top:-80px;right:-60px;background:#FFD1DC;opacity:.35;filter:blur(80px)}.app-blob.b2{width:320px;height:320px;bottom:-100px;left:-80px;background:#FCD5CE;opacity:.25;filter:blur(90px)}.page-header{position:relative;z-index:1;display:flex;align-items:center;gap:8px;padding:4px 16px 10px}.page-header .back-btn{width:34px;height:34px;border-radius:50%;background:var(--canvas-soft);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--body);font-weight:700;transition:background .15s;flex-shrink:0}.page-header .back-btn:active{background:var(--mute)}.page-header h1{font-size:20px;font-weight:700;color:var(--primary-dark);font-family:var(--font-heading)}.page-header .add-btn{margin-left:auto;background:none;border:none;color:var(--primary-dark);font-size:24px;font-weight:700;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s}.page-header .add-btn:active{background:var(--canvas-soft)}.content{position:relative;z-index:1;flex:1;overflow-y:auto;padding:0 16px 8px;-webkit-overflow-scrolling:touch}.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--mute);border-radius:4px}.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:10px 12px;background:var(--canvas-soft);border-radius:var(--radius-md)}.filter-bar select,.filter-bar input{padding:6px 10px;border:2px solid var(--mute);border-radius:var(--radius-sm);font-size:12px;outline:none;background:var(--canvas);font-family:inherit;font-weight:600;min-width:80px;flex:1;transition:border .12s}.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}.filter-bar .search-wrap{position:relative;flex:1;min-width:100px}.filter-bar .search-wrap input{width:100%;padding-left:28px}.filter-bar .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--body-mid);font-size:12px;pointer-events:none}.view-toggle{display:flex;gap:3px;background:var(--canvas);border-radius:var(--radius-sm);padding:3px}.view-toggle button{background:none;border:none;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--body-mid);font-weight:600;transition:background .12s}.view-toggle button.active{background:var(--primary);color:var(--on-primary)}.book-grid{display:grid;gap:10px}.book-grid.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.book-grid.list{grid-template-columns:1fr}.book-card{background:var(--canvas);border-radius:var(--radius-md);overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:var(--shadow);border:1.5px solid rgba(255,156,181,.08)}.book-card:active{transform:scale(.97)}.book-card.grid .book-card-cover{height:160px;background:var(--mute);overflow:hidden;display:flex;align-items:center;justify-content:center}.book-card.grid .book-card-cover img{width:100%;height:100%;object-fit:cover}.book-card.grid .book-card-body{padding:8px 10px}.book-card.grid .book-card-body h4{font-size:12px;font-weight:600;color:var(--ink)}.book-card.grid .book-card-body .meta{font-size:10px;color:var(--body-mid);margin-top:2px}.book-card.grid .book-card-body .price{font-size:12px;font-weight:600;color:var(--primary-dark);margin-top:3px}.book-card.list .book-card-inner{display:flex;gap:10px;padding:10px}.book-card.list .book-card-cover{width:45px;height:60px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;background:var(--mute);display:flex;align-items:center;justify-content:center}.book-card.list .book-card-cover img{width:100%;height:100%;object-fit:cover}.book-card.list .book-card-body{flex:1;display:flex;flex-direction:column;justify-content:center}.book-card.list .book-card-body h4{font-size:13px;font-weight:600;color:var(--ink)}.book-card.list .book-card-body .meta{font-size:11px;color:var(--body-mid)}.book-card.list .book-card-body .price{font-size:12px;font-weight:600;color:var(--primary-dark);margin-top:2px}.book-count{font-size:12px;color:var(--body-mid);font-weight:600;margin-bottom:8px}.empty-state{text-align:center;padding:40px 20px;color:var(--body-mid);font-size:14px}.empty-state .empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}.tab-bar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px);background:var(--canvas);border-top:1.5px solid var(--canvas-soft);flex-shrink:0}.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border:none;background:none;cursor:pointer;font-family:inherit;transition:opacity .12s;position:relative}.tab-item:active{opacity:.6}.tab-item .tab-icon{font-size:20px;line-height:1;font-weight:600;color:var(--body-mid);transition:color .15s;font-family:var(--font-heading)}.tab-item .tab-label{font-size:10px;color:var(--body-mid);font-weight:600;transition:color .15s}.tab-item.active .tab-icon{color:var(--primary-dark)}.tab-item.active .tab-label{color:var(--primary-dark)}.tab-item .tab-active-face{position:absolute;top:-14px;font-size:8px;color:var(--primary);opacity:0;transition:opacity .15s;pointer-events:none}.tab-item.active .tab-active-face{opacity:.6}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,58,62,.35);z-index:1000;align-items:center;justify-content:center;padding:20px}.modal-overlay.open{display:flex}.modal{background:var(--canvas);border-radius:var(--radius-md);padding:20px;max-width:380px;width:100%;max-height:85vh;overflow-y:auto}.modal h2{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:12px;font-family:var(--font-heading)}.modal p{font-size:13px;color:var(--body);margin-bottom:12px}.form-group{margin-bottom:10px}.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ink);margin-bottom:3px}.form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid var(--mute);border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--canvas);font-family:inherit;font-weight:600;transition:border .12s}.form-group input:focus,.form-group select:focus{border-color:var(--primary)}.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}.modal-actions .btn-text{background:none;color:var(--body);padding:8px 14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:inherit;font-size:13px}.modal-actions .btn-pink{background:var(--primary);color:var(--on-primary);padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 12px rgba(255,156,181,.25)}.modal-actions .btn-pink:active{transform:scale(.96)}.modal-actions .btn-red{background:#E87A7A;color:white;padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 12px rgba(232,122,122,.25)}.modal-actions .btn-red:active{transform:scale(.96)}.modal-actions .btn-green{background:#2a9d8f;color:white;padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 12px rgba(42,157,143,.25)}.modal-actions .btn-green:active{transform:scale(.96)}@media(min-width:481px){.app{border-radius:28px;margin:20px auto;height:calc(100dvh - 40px);box-shadow:0 0 40px rgba(0,0,0,.06)}}
</style></head><body><script src="books.js"></script>
<div class="app"><div class="app-blob b1"></div><div class="app-blob b2"></div>
<div class="page-header"><button class="back-btn" onclick="history.back()">&#8592;</button><h1>图书列表</h1><button class="add-btn" onclick="addBook()">+</button></div>
<div class="content">
<div id="pageList">
<div class="filter-bar"><div class="search-wrap"><span class="search-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="14" cy="14" r="14"/><line x1="21" y1="21" x2="15" y2="15"/></svg></span><input type="text" id="searchInput" placeholder="搜索..." oninput="filterB()"></div><div class="view-toggle"><button class="active" onclick="setView(this,'grid')">&#9634;</button><button onclick="setView(this,'list')">&#9776;</button></div></div>
<div class="book-count" id="bookCount">共 0 本</div>
<div class="book-grid grid" id="bookGrid"></div></div>
<div id="pageDetail" style="display:none"><div class="empty-state" id="bookDetailContent">加载中...</div></div></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<script>
var D={cabinets:[],books:[],soldBooks:[]};
function sv(){try{localStorage.setItem('z2_books',JSON.stringify(D.books));}catch(e){}try{localStorage.setItem('z2_sold',JSON.stringify(D.soldBooks));}catch(e){}}
function ld(){var v=localStorage.getItem("z2_ver");if(v!=="v15"){localStorage.clear();}try{D.cabinets=JSON.parse(localStorage.getItem("z2_cabs"))||[];}catch(e){}try{D.books=JSON.parse(localStorage.getItem("z2_books"))||[];}catch(e){}try{D.soldBooks=JSON.parse(localStorage.getItem("z2_sold"))||[];}catch(e){}}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cabName(id){var c=D.cabinets.find(function(x){return x.id===id;});return c?c.name:'-';}
function catName(id){for(var i=0;i<D.cabinets.length;i++){var c=D.cabinets[i].cats||[];for(var j=0;j<c.length;j++){if(c[j].id===id)return c[j].name;}}return '-';}
function catsByCab(cabId){var c=D.cabinets.find(function(x){return x.id===cabId;});return c?c.cats||[]:[];}
function fmt(n){return(n==null||isNaN(n))?'0.00':Number(n).toFixed(2);}
function imgSrc(ci){if(!ci)return '';if(ci.indexOf('data:')===0)return ci;return 'assets/'+ci;}
function resizeImg(file,cb){var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),w=img.width,h=img.height,md=400;if(w>md||h>md){var ra=Math.min(md/w,md/h);w=Math.round(w*ra);h=Math.round(h*ra)}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.7));};img.src=r.result;};r.readAsDataURL(file);}
function findCatId(cabId,edition){var cab=D.cabinets.find(function(c){return c.id===cabId;});if(!cab||!cab.cats)return'';var cat=cab.cats.find(function(c){return c.name===edition;});return cat?cat.id:'';}

var view='grid';
function setView(btn,v){view=v;renderBooks();document.querySelectorAll('.view-toggle button').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
var g_fCab='',g_fCat='',g_cats=[];
function getFiltered(){var q=(document.getElementById('searchInput').value||'').toLowerCase();return D.books.filter(function(b){if(b.status==='sold')return false;if(g_fCab&&b.cabinetId!==g_fCab)return false;if(g_fCat&&b.categoryId!==g_fCat)return false;if(g_cats.length&&g_cats.indexOf(b.categoryId)===-1)return false;if(q&&b.title.toLowerCase().indexOf(q)===-1&&(b.author||'').toLowerCase().indexOf(q)===-1&&(b.edition||'').toLowerCase().indexOf(q)===-1&&(b.merch||'').toLowerCase().indexOf(q)===-1)return false;return true;});}
function renderBooks(){var books=getFiltered();document.getElementById('bookCount').textContent='共 '+books.length+' 本';var grid=document.getElementById('bookGrid');if(books.length===0){grid.innerHTML='<div class="empty-state"><div class="empty-icon">&#128214;</div><p>还没有图书</p></div>';return;}var h='';books.forEach(function(b){h+='<div class="book-card '+view+'" onclick="showBook(\''+b.id+'\')">'+(view==='grid'?'<div class="book-card-cover">'+(b.ci?'<img src="'+imgSrc(b.ci)+'" alt="">':'')+'</div><div class="book-card-body"><h4>'+esc(b.title)+'</h4><div class="meta">'+(g_fCab?'':esc(cabName(b.cabinetId))+' . '+esc(catName(b.categoryId)))+'</div><div class="price">'+fmt(b.pp)+' x '+(b.qty||1)+'</div></div>':'<div class="book-card-inner"><div class="book-card-cover">'+(b.ci?'<img src="'+imgSrc(b.ci)+'" alt="">':'')+'</div><div class="book-card-body"><h4>'+esc(b.title)+'</h4><div class="meta">'+(g_fCab?'':esc(cabName(b.cabinetId))+' . '+esc(catName(b.categoryId)))+'</div><div class="price">'+fmt(b.pp)+' x '+(b.qty||1)+'</div></div></div>')+'</div>';});grid.innerHTML=h;}
function filterB(){renderBooks();}


function addBook(){var cabOpts='';var defCab=g_fCab||'';D.cabinets.forEach(function(c){cabOpts+='<option value="'+c.id+'"'+(c.id===defCab?' selected':'')+'>'+esc(c.name)+'</option>';});openModal('<h2>添加图书</h2><div class="form-group"><label>所属柜子</label><select id="mBCab" onchange="updateCatOpts()">'+cabOpts+'</select></div><div class="form-group"><label>所属分类</label><select id="mBCat"></select></div><div class="form-group"><label>书名</label><input type="text" id="mBTitle" placeholder="输入书名"></div><div class="form-group"><label>作者</label><input type="text" id="mBAuthor" placeholder="输入作者"></div><div class="form-group"><label>版本</label><input type="text" id="mBEdition" placeholder="如：第一版、精装版"></div><div class="form-group"><label>数量</label><input type="number" id="mBQty" value="1" min="1" style="max-width:70px"></div><div class="form-group"><label>买入金额</label><input type="number" id="mBPr" step="0.01" placeholder="0.00" style="max-width:120px"></div><div class="form-group"><label>售价</label><input type="number" id="mBSp" step="0.01" placeholder="售出价" style="max-width:120px"></div><div class="form-group"><label>周边</label><input type="text" id="mBMerch" placeholder="如：书签、明信片、海报"></div><div class="form-group"><label>封面图片</label><input type="file" id="mBCv" accept="image/*"></div><div class="modal-actions"><button class="btn-text" onclick="closeModal()">取消</button><button class="btn-pink" onclick="saveBook()">保存</button></div>');updateCatOpts();var defCat=g_fCat||(g_cats.length?g_cats[0]:'');if(defCat){var cs=document.getElementById('mBCat');if(cs)cs.value=defCat;}}
function updateCatOpts(){var sel=document.getElementById('mBCab');var catSel=document.getElementById('mBCat');var cabId=sel.value;catSel.innerHTML='';var cs=catsByCab(cabId)||[];cs.forEach(function(c){catSel.innerHTML+='<option value="'+c.id+'">'+esc(c.name)+'</option>';});}
function saveBook(){var title=document.getElementById('mBTitle').value.trim();if(!title){alert('请输入书名');return;}var cabId=document.getElementById('mBCab').value;var catId=document.getElementById('mBCat').value;if(!cabId){alert('请选择柜子');return;}if(!catId){var cab=catsByCab(cabId);if(cab.length>0){catId=cab[0].id;}else{alert('该柜子还没有分类，请先在主页添加分类');return;}}var author=document.getElementById('mBAuthor').value.trim();var edition=document.getElementById('mBEdition').value.trim();var qty=parseInt(document.getElementById('mBQty').value)||1;var pp=parseFloat(document.getElementById('mBPr').value)||0;var merch=document.getElementById('mBMerch').value.trim();var sp=parseFloat(document.getElementById('mBSp').value)||0;var fi=document.getElementById('mBCv');var data={id:uid(),title:title,author:author,edition:edition,cabinetId:cabId,categoryId:catId,qty:qty,pp:pp,sp:sp,profit:sp?sp-pp:null,merch:merch,ci:'',status:sp?'sold':'active',createdAt:Date.now(),soldAt:sp?Date.now():null};if(fi&&fi.files.length>0){resizeImg(fi.files[0],function(du){data.ci=du;D.books.push(data);sv();closeModal();renderBooks();});}else{D.books.push(data);sv();closeModal();renderBooks();}}

function showBook(id){var b=D.books.find(function(x){return x.id===id;});if(!b||b.status==='sold')return;document.getElementById('pageList').style.display='none';document.getElementById('pageDetail').style.display='block';
document.getElementById('bookDetailContent').innerHTML='<div style="text-align:left;padding:0"><div style="display:flex;gap:14px;margin-bottom:14px"><div style="width:120px;height:170px;border-radius:var(--radius-sm);overflow:hidden;background:var(--mute);flex-shrink:0;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center">'+(b.ci?'<img src="'+imgSrc(b.ci)+'" style="width:100%;height:100%;object-fit:cover">':'')+'</div><div style="flex:1"><h2 style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px;font-family:var(--font-heading)">'+esc(b.title)+'</h2><table style="width:100%;border-collapse:collapse;font-size:13px">'+(b.author?'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600;width:70px">作者</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+esc(b.author)+'</td></tr>':'')+'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">'+(g_fCab?'':'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600;width:70px">柜子</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+esc(cabName(b.cabinetId))+'</td></tr>')+'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">分类</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+esc(catName(b.categoryId))+'</td></tr><tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">数量</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+(b.qty||1)+' 本</td></tr>'+(b.edition?'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">版本</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+esc(b.edition)+'</td></tr>':'')+'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">买入</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+fmt(b.pp)+'</td></tr>'+(b.merch?'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">周边</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--ink);font-weight:600">'+esc(b.merch)+'</td></tr>':'')+'<tr><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:var(--body-mid);font-weight:600">状态</td><td style="padding:5px 0;border-bottom:1px solid var(--canvas-soft);color:#2a9d8f;font-weight:600">&#9679; 在藏</td></tr></table></div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn-green" onclick="sellBook(\''+b.id+'\')" style="padding:8px 14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:inherit;font-size:13px;background:#2a9d8f;color:white">标记售出</button><button class="btn-text" onclick="editBook(\''+b.id+'\')" style="padding:8px 14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:inherit;font-size:13px">编辑</button><button class="btn-text" style="padding:8px 14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:inherit;font-size:13px;color:#E87A7A" onclick="confirmDelBook(\''+b.id+'\')">删除</button></div></div>';}
function hideDetail(){document.getElementById('pageList').style.display='';document.getElementById('pageDetail').style.display='none';}

function editBook(id){var b=D.books.find(function(x){return x.id===id;});if(!b)return;openModal('<h2>编辑图书</h2><div class="form-group"><label>书名</label><input type="text" id="mBTitle" value="'+esc(b.title)+'"></div><div class="form-group"><label>作者</label><input type="text" id="mBAuthor" value="'+esc(b.author||'')+'"></div><div class="form-group"><label>版本</label><input type="text" id="mBEdition" value="'+esc(b.edition||'')+'"></div><div class="form-group"><label>数量</label><input type="number" id="mBQty" value="'+(b.qty||1)+'" min="1" style="max-width:70px"></div><div class="form-group"><label>买入金额</label><input type="number" id="mBPr" step="0.01" value="'+fmt(b.pp)+'" style="max-width:120px"></div><div class="form-group"><label>周边</label><input type="text" id="mBMerch" value="'+esc(b.merch||'')+'"></div><div class="form-group"><label>更换封面</label><input type="file" id="mBCv" accept="image/*"></div><div class="modal-actions"><button class="btn-text" onclick="closeModal()">取消</button><button class="btn-pink" onclick="updateBook(\''+id+'\')">保存</button></div>');}
function updateBook(id){var b=D.books.find(function(x){return x.id===id;});if(!b)return;var t=document.getElementById('mBTitle').value.trim();if(t)b.title=t;b.author=document.getElementById('mBAuthor').value.trim();b.edition=document.getElementById('mBEdition').value.trim();b.qty=parseInt(document.getElementById('mBQty').value)||1;b.pp=parseFloat(document.getElementById('mBPr').value)||0;b.merch=document.getElementById('mBMerch').value.trim();var fi=document.getElementById('mBCv');if(fi&&fi.files.length>0){resizeImg(fi.files[0],function(du){b.ci=du;sv();closeModal();showBook(id);renderBooks();});}else{sv();closeModal();showBook(id);renderBooks();}}
function confirmDelBook(id){var b=D.books.find(function(x){return x.id===id;});if(!b)return;openModal('<h2>确认删除</h2><p>确定删除「'+esc(b.title)+'」吗？不可撤销。</p><div class="modal-actions"><button class="btn-text" onclick="closeModal()">取消</button><button class="btn-red" onclick="deleteBook(\''+id+'\')">确认删除</button></div>');}
function deleteBook(id){D.books=D.books.filter(function(x){return x.id!==id;});sv();closeModal();hideDetail();renderBooks();}
function sellBook(id){var b=D.books.find(function(x){return x.id===id;});if(!b)return;openModal('<h2>标记售出</h2><p>为「'+esc(b.title)+'」输入售出金额：</p><div class="form-group"><label>售出金额</label><input type="number" id="mSPr" step="0.01" placeholder="0.00" style="max-width:120px"></div><div class="modal-actions"><button class="btn-text" onclick="closeModal()">取消</button><button class="btn-green" onclick="confirmSell(\''+id+'\')">确认售出</button></div>');}
function confirmSell(id){var b=D.books.find(function(x){return x.id===id;});if(!b)return;var sp=parseFloat(document.getElementById('mSPr').value)||0;var sold=JSON.parse(JSON.stringify(b));sold.sp=sp;sold.profit=sp-(sold.pp||0);sold.status='sold';sold.soldAt=Date.now();D.soldBooks.push(sold);D.books=D.books.filter(function(x){return x.id!==id;});sv();closeModal();hideDetail();renderBooks();}

function initBookData(){
if(D.cabinets.length===0){window.location.href='fig-untitled-1.html';return;}
if(D.books.length>0)return;
var items=typeof BOOKS_DATA!='undefined'?BOOKS_DATA:[];
for(var i=0;i<items.length;i++){var o=items[i];D.books.push({id:uid(),cabinetId:o.cabinetId,categoryId:o.categoryId,title:o.title,author:o.author,edition:o.edition,merch:o.merch,qty:o.qty,pp:o.pp,ci:'',status:'active',createdAt:Date.now()});}
sv();renderBooks();localStorage.setItem('z2_ver','v15');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
