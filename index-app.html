<style>
:root{--canvas:#FFF9F8;--canvas-soft:#FFF2EE;--ink:#4A3A3E;--body:#6B5A5E;--body-mid:#9A8A8E;--mute:#E8D5D0;--primary:#FF9CB5;--primary-dark:#E87A95;--on-primary:#FFFEFB;--radius-sm:10px;--radius-md:18px;--radius-pill:9999px;--font:"Quicksand","Nunito",sans-serif;--font-heading:"Bricolage Grotesque","Nunito",sans-serif;--shadow:0 4px 16px rgba(255,156,181,.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#FFF5F2}
body{font-family:var(--font);font-size:16px;line-height:1.5;color:var(--body);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--canvas);position:relative;overflow:hidden}
.app-blob{position:absolute;border-radius:9999px;pointer-events:none;z-index:0}
.app-blob.b1{width:280px;height:280px;top:-80px;right:-60px;background:#FFD1DC;opacity:.35;filter:blur(80px)}
.app-blob.b2{width:320px;height:320px;bottom:-100px;left:-80px;background:#FCD5CE;opacity:.25;filter:blur(90px)}
.app-blob.b3{width:180px;height:180px;top:40%;right:-40px;background:#E8D5F0;opacity:.2;filter:blur(60px)}
.header{position:relative;z-index:1;padding:4px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.header-left .greeting{font-size:14px;color:var(--body-mid)}
.header-left .greeting strong{font-size:20px;color:var(--primary-dark);display:block;margin-top:2px;font-family:var(--font-heading);letter-spacing:-0.3px}
.header-left .avatar-wrap{position:relative;width:46px;height:46px;border-radius:50%;flex-shrink:0;cursor:pointer}
.header-left .avatar{width:46px;height:46px;border-radius:50%;background:var(--mute);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;border:2.5px solid var(--primary);transition:transform .15s,box-shadow .15s}
.header-left .avatar:hover{transform:scale(1.05);box-shadow:0 0 0 4px rgba(255,156,181,.25)}
.header-left .avatar img{width:100%;height:100%;object-fit:cover}
.header-left .avatar-edit{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--primary);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;border:2px solid var(--canvas);font-weight:700;pointer-events:none}
.header-right{display:flex;gap:8px}
.header-right .icon-btn{width:38px;height:38px;border-radius:50%;background:var(--canvas-soft);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--body);transition:background .15s;font-weight:700}
.header-right .icon-btn:active{background:var(--mute)}
.search-bar{position:relative;z-index:1;margin:0 16px 14px}
.search-bar input{width:100%;padding:12px 16px 12px 42px;border:2px solid transparent;border-radius:var(--radius-pill);font-size:14px;outline:none;background:var(--canvas-soft);color:var(--ink);transition:border .15s,background .15s;font-weight:600}
.search-bar input:focus{border-color:var(--primary);background:var(--canvas)}
.search-bar input::placeholder{color:var(--body-mid)}
.search-bar .search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--body-mid);pointer-events:none}
.content{position:relative;z-index:1;flex:1;overflow-y:auto;padding:0 16px 8px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--mute);border-radius:4px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--canvas);border-radius:var(--radius-md);padding:12px 10px;text-align:center;box-shadow:var(--shadow);border:1.5px solid rgba(255,156,181,.15)}
.stat-card .stat-label{font-size:13px;font-weight:600;color:var(--body-mid);margin-bottom:2px;font-family:var(--font)}
.stat-card .stat-value{font-size:26px;font-weight:700;color:var(--ink);line-height:1.15;font-family:var(--font-heading)}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title h3{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--font-heading)}
.section-title a{font-size:13px;color:var(--primary-dark);text-decoration:none;font-weight:600}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px 10px;background:var(--canvas);border-radius:var(--radius-md);cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid rgba(255,156,181,.1);box-shadow:var(--shadow);font-family:inherit;position:relative}
.cat-item:active{transform:scale(.94)}
.cat-item .cat-icon{font-size:13px;font-weight:700;width:40px;height:40px;border-radius:50%;background:var(--canvas-soft);display:flex;align-items:center;justify-content:center;color:var(--primary-dark)}
.cat-item .cat-name{font-size:11px;color:var(--body);font-weight:600}
.cat-item .cat-count{font-size:10px;color:var(--body-mid);font-weight:600}
.recent-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.recent-list::-webkit-scrollbar{height:4px}
.recent-list::-webkit-scrollbar-thumb{background:var(--mute);border-radius:4px}
.recent-book{flex-shrink:0;width:100px;cursor:pointer;transition:transform .15s}
.recent-book:active{transform:scale(.95)}
.recent-book .cover{width:100px;height:130px;border-radius:var(--radius-sm);overflow:hidden;background:var(--mute);margin-bottom:6px;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center}
.recent-book .cover img{width:100%;height:100%;object-fit:cover}
.recent-book .b-title{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
.recent-book .b-meta{font-size:10px;color:var(--body-mid);margin-top:2px;font-weight:600}
.empty-state-home{text-align:center;padding:20px;color:var(--body-mid);font-size:13px;grid-column:1/-1}
.tab-bar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px);background:var(--canvas);border-top:1.5px solid var(--canvas-soft);flex-shrink:0}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border:none;background:none;cursor:pointer;font-family:inherit;transition:opacity .12s;position:relative}
.tab-item:active{opacity:.6}
.tab-item .tab-icon{font-size:20px;line-height:1;font-weight:600;color:var(--body-mid);transition:color .15s}
.tab-item .tab-label{font-size:10px;color:var(--body-mid);font-weight:600;transition:color .15s}
.tab-item.active .tab-icon{color:var(--primary-dark)}
.tab-item.active .tab-label{color:var(--primary-dark)}
.tab-item .tab-active-face{position:absolute;top:-14px;font-size:8px;color:var(--primary);opacity:0;transition:opacity .15s;pointer-events:none}
.tab-item.active .tab-active-face{opacity:.6}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,58,62,.35);z-index:1000;align-items:center;justify-content:center;padding:20px}.modal-overlay.open{display:flex}.modal{background:var(--canvas);border-radius:var(--radius-md);padding:20px;max-width:380px;width:100%;max-height:85vh;overflow-y:auto}.modal h2{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:12px;font-family:var(--font-heading)}.form-group{margin-bottom:10px}.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ink);margin-bottom:3px}.form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid var(--mute);border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--canvas);font-family:inherit;font-weight:600}.form-group input:focus,.form-group select:focus{border-color:var(--primary)}.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}.modal-actions .btn-text{background:none;color:var(--body);padding:8px 14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;border:none;font-family:inherit;font-size:13px}.modal-actions .btn-pink{background:var(--primary);color:var(--on-primary);padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 4px 12px rgba(255,156,181,.25)}
@media(min-width:481px){.app{border-radius:28px;margin:20px auto;height:calc(100vh - 40px);box-shadow:0 0 40px rgba(0,0,0,.06)}}
</style>
</head>

<script>
var D={cabinets:[],books:[],soldBooks:[]};
function ld(){var v=localStorage.getItem("z2_ver");if(v!=="v15"){localStorage.clear();}try{D.cabinets=JSON.parse(localStorage.getItem("z2_cabs"))||[];}catch(e){}try{D.books=JSON.parse(localStorage.getItem("z2_books"))||[];}catch(e){}try{D.soldBooks=JSON.parse(localStorage.getItem("z2_sold"))||[];}catch(e){}}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function svCab(){var cab=D.cabinets.map(function(x){return{id:x.id,name:x.name,ci:x.ci||'',cats:(x.cats||[]).map(function(c){return{id:c.id,name:c.name}})}});try{localStorage.setItem('z2_cabs',JSON.stringify(cab));}catch(e){}}
function imgSrc(ci){if(!ci)return '';if(ci.indexOf('data:')===0)return ci;return 'assets/'+ci;}
function findCatId(cabId,edition){var cab=D.cabinets.find(function(c){return c.id===cabId;});if(!cab||!cab.cats)return'';var cat=cab.cats.find(function(c){return c.name===edition;});return cat?cat.id:'';}
function openModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function saveCategory(){var cabId=document.getElementById('mCatCab').value;var n=document.getElementById('mCatName').value.trim();if(!n||!cabId)return;var cab=D.cabinets.find(function(c){return c.id===cabId;});if(!cab)return;if(!cab.cats)cab.cats=[];cab.cats.push({id:uid(),name:n});svCab();closeModal();render();}

function render(){
  ld();
  var all=D.books.concat(D.soldBooks);
  var totalBooks=all.reduce(function(s,b){return s+(b.qty||1);},0);
